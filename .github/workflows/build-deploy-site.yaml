name: Deploy Static Site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# These permissions are required for the deploy-pages action
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    env:
      CNAME_DOMAIN: ${{ vars.CNAME_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: |
          node build.js
          echo "$CNAME_DOMAIN" > ./static-content/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./static-content"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4